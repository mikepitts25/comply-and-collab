# Comply & Collab — self-contained stack for on-prem / air-gapped deployment.
# Usage:
#   docker compose up --build           # first run (add SEED=true to load demo data)
#   docker compose up                    # subsequent runs
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: comply
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-comply}
      POSTGRES_DB: comply
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comply"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://comply:${POSTGRES_PASSWORD:-comply}@db:5432/comply?schema=public"
      AUTH_SECRET: "${AUTH_SECRET:-change-me-in-production-please-generate-a-real-secret}"
      SESSION_TTL_HOURS: "12"
      # Set SEED=true on the very first boot to load demo data, then remove it.
      SEED: "${SEED:-false}"
    ports:
      - "3000:3000"

volumes:
  db-data:
